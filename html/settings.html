<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="settingsTitle">设置 - MyTabSearch</title>
  <script src="../js/utils/theme-early.js"></script>
  <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
  <div class="settings-container">
    <!-- 账户信息区域 -->
    <section class="settings-section" id="account-section">
      <h2 data-i18n="accountInfoTitle">账户信息</h2>
      <div class="account-card">
        <div class="account-info">
          <div class="account-avatar" id="account-avatar">
            <span id="avatar-letter">?</span>
          </div>
          <div class="account-details">
            <p class="account-email" id="account-email" data-i18n="loadingText">加载中...</p>
            <p class="account-status" id="account-status">
              <span class="vip-badge" id="vip-badge" style="display: none;">VIP</span>
            </p>
          </div>
          <div class="account-actions">
            <button class="btn-login" id="btn-login" style="display: none;" data-i18n="loginOrRegister">登录 / 注册</button>
            <button class="btn-logout" id="btn-logout" style="display: none;" data-i18n="logout">退出登录</button>
          </div>
        </div>

        <!-- VIP 状态显示 -->
        <div class="vip-status" id="vip-status" style="display: none;">
          <div class="vip-info">
            <span class="vip-label" data-i18n="vipStatusLabel">VIP状态:</span>
            <span class="vip-value" id="vip-status-value">-</span>
          </div>
          <div class="vip-info">
            <span class="vip-label" data-i18n="vipExpiresLabel">到期时间:</span>
            <span class="vip-value" id="vip-expires">-</span>
          </div>
        </div>

        <!-- 体验期状态显示 -->
        <div class="trial-status" id="trial-status" style="display: none;">
          <div class="trial-info">
            <span class="trial-label" id="trial-label" data-i18n="trialRemainingLabel" style="display: none;">体验期剩余:</span>
            <span class="trial-value" id="trial-days-left">-</span>
          </div>
          <button class="btn-trial-extend" id="btn-extend-trial" style="display: none;" data-i18n="extendTrial">
            延展体验期
          </button>
        </div>
      </div>
    </section>

    <!-- 快捷键设置 -->
    <section class="settings-section shortcuts-section">
      <h2 data-i18n="keyboardShortcutsTitle">快捷键设置</h2>
      <div class="shortcut-content">
        <p class="shortcut-tip" data-i18n="shortcutTipText">Due to Chrome security restrictions, keyboard shortcuts need to be manually confirmed after installation. Click the button below to set up:</p>
        <div class="shortcut-setup">
          <button class="btn-setup-shortcut" id="btn-setup-shortcut" data-i18n="setupShortcutsBtn">设置快捷键</button>
        </div>
      </div>
    </section>

    <!-- 语言设置 -->
    <section class="settings-section">
      <h2 data-i18n="languageSettingsTitle">语言设置</h2>
      <div class="setting-item">
        <label for="language-select" data-i18n="selectLanguageLabel">选择语言:</label>
        <select id="language-select">
          <option value="en">English</option>
          <option value="zh_CN" data-i18n="chineseOption">中文</option>
        </select>
      </div>
    </section>

    <!-- 主题设置 -->
    <section class="settings-section" id="theme-section">
      <h2 data-i18n="themeSettingsTitle">主题设置</h2>
      <div class="theme-options">
        <label class="theme-option">
          <input type="radio" name="theme" value="light" id="theme-light">
          <div class="theme-card theme-light-card">
            <div class="theme-preview theme-light-preview">
              <div class="theme-preview-header"></div>
              <div class="theme-preview-content">
                <div class="theme-preview-sidebar"></div>
                <div class="theme-preview-main"></div>
              </div>
            </div>
            <span class="theme-label" data-i18n="lightThemeLabel">浅色主题</span>
          </div>
        </label>
        <label class="theme-option">
          <input type="radio" name="theme" value="dark" id="theme-dark">
          <div class="theme-card theme-dark-card">
            <div class="theme-preview theme-dark-preview">
              <div class="theme-preview-header"></div>
              <div class="theme-preview-content">
                <div class="theme-preview-sidebar"></div>
                <div class="theme-preview-main"></div>
              </div>
            </div>
            <span class="theme-label" data-i18n="darkThemeLabel">深色主题</span>
          </div>
        </label>
      </div>
    </section>

    <!-- 搜索规则设置 -->
    <section class="settings-section">
      <h2 data-i18n="searchRuleSettingsTitle">搜索规则设置</h2>
      <div class="setting-item">
        <label for="search-match-mode" data-i18n="selectSearchMatchModeLabel">选择搜索匹配模式:</label>
        <select id="search-match-mode">
          <option value="1" data-i18n="mode1Title" selected>模式1：标题关键字快速匹配</option>
          <option value="2" data-i18n="mode2Title">模式2：标题子序列匹配</option>
          <option value="3" data-i18n="mode3Title">模式3：标题关键字快速匹配+网页内容匹配</option>
          <option value="4" data-i18n="mode4Title">模式4：标题子序列匹配+网页内容匹配</option>
        </select>
      </div>
      <div class="setting-description" data-i18n="searchMatchModeDesc">
        不同的搜索模式会影响标签页的匹配规则和排序方式
      </div>
    </section>

    <!-- 状态消息 -->
    <div class="status-message" id="status-message"></div>

    <!-- 登录弹窗 -->
    <div class="login-modal" id="login-modal" style="display: none;">
      <div class="login-modal-overlay"></div>
      <div class="login-modal-content">
        <button class="login-modal-close" id="login-modal-close">&times;</button>
        <h2 data-i18n="loginOrRegister">登录 / 注册</h2>
        
        <!-- 邮箱登录 -->
        <div class="login-section" id="login-email-section">
          <div class="input-group">
            <input type="email" id="login-email-input" data-i18n-placeholder="enterEmailPlaceholder" placeholder="请输入邮箱地址">
          </div>
          <button class="btn-primary" id="login-btn-send-code" data-i18n="sendVerificationCode">发送验证码</button>
          
          <div class="verify-section" id="login-verify-section" style="display: none;">
            <div class="input-group">
              <input type="text" id="login-code-input" data-i18n-placeholder="enterCodePlaceholder" placeholder="请输入验证码" maxlength="6">
            </div>
            <button class="btn-primary" id="login-btn-verify" data-i18n="verifyAndLogin">验证并登录</button>
            <button class="btn-secondary" id="login-btn-resend-code" style="display: none;" disabled>重新发送 (60s)</button>
          </div>
        </div>
        
        <!-- 分割线 -->
        <div class="divider">
          <span data-i18n="orText">或</span>
        </div>
        
        <!-- OAuth 登录 -->
        <div class="oauth-buttons">
          <button class="btn-oauth btn-google" id="login-btn-google">
            <span class="oauth-icon">G</span>
            <span data-i18n="loginWithGoogle">使用 Google 账号登录</span>
          </button>
          <button class="btn-oauth btn-microsoft" id="login-btn-microsoft">
            <span class="oauth-icon">M</span>
            <span data-i18n="loginWithMicrosoft">使用 Microsoft 账号登录</span>
          </button>
        </div>
        
        <!-- 跳过登录 -->
        <div class="skip-section">
          <button class="btn-link" id="login-btn-skip" data-i18n="skipForNow">暂时跳过</button>
        </div>
        
        <!-- 状态消息 -->
        <div class="status-message" id="login-status-message"></div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/settings.js"></script>
  <script src="../js/utils/theme.js"></script>
  <script type="module" src="../js/utils/theme-settings.js"></script>
</body>
</html>
